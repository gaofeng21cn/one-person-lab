name: OPL Quality Details
description: Emit OPL quality details markdown and JSON sidecar for repo-family advisory workflows.

inputs:
  root:
    description: Repository root to inspect.
    required: false
    default: .
  limit:
    description: Markdown finding limit.
    required: false
    default: '20'
  json-limit:
    description: JSON finding limit.
    required: false
    default: '50'
  focus:
    description: Quality details focus.
    required: false
    default: auto
  compare-ref:
    description: Optional Git ref to compare against for changed function diagnostics.
    required: false
    default: ''
  output-dir:
    description: Directory for quality-details.json.
    required: false
    default: artifacts/opl-quality-details

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'

    - name: Install OPL dependencies
      shell: bash
      run: npm ci --prefix "$GITHUB_ACTION_PATH/../../.."

    - name: Emit OPL quality details
      shell: bash
      env:
        OPL_QUALITY_DETAILS_ROOT: ${{ inputs.root }}
        OPL_QUALITY_DETAILS_LIMIT: ${{ inputs.limit }}
        OPL_QUALITY_DETAILS_JSON_LIMIT: ${{ inputs.json-limit }}
        OPL_QUALITY_DETAILS_FOCUS: ${{ inputs.focus }}
        OPL_QUALITY_DETAILS_COMPARE_REF: ${{ inputs.compare-ref }}
        OPL_QUALITY_DETAILS_OUTPUT_DIR: ${{ inputs.output-dir }}
      run: |
        set -euo pipefail
        opl_root="$GITHUB_ACTION_PATH/../../.."
        quality_root="$(cd "$OPL_QUALITY_DETAILS_ROOT" && pwd)"
        mkdir -p "$OPL_QUALITY_DETAILS_OUTPUT_DIR"
        compare_args=()
        if [ -n "$OPL_QUALITY_DETAILS_COMPARE_REF" ]; then
          if [[ "$OPL_QUALITY_DETAILS_COMPARE_REF" == origin/* ]]; then
            compare_branch="${OPL_QUALITY_DETAILS_COMPARE_REF#origin/}"
            git -C "$quality_root" fetch --no-tags --prune origin "${compare_branch}:refs/remotes/origin/${compare_branch}"
          fi
          git -C "$quality_root" rev-parse --verify "$OPL_QUALITY_DETAILS_COMPARE_REF^{commit}" >/dev/null
          compare_args=(--compare-ref "$OPL_QUALITY_DETAILS_COMPARE_REF")
        fi
        "$opl_root/bin/opl" quality details --root "$quality_root" --format markdown --limit "$OPL_QUALITY_DETAILS_LIMIT" --focus "$OPL_QUALITY_DETAILS_FOCUS" "${compare_args[@]}" >> "$GITHUB_STEP_SUMMARY"
        "$opl_root/bin/opl" quality details --root "$quality_root" --format json --limit "$OPL_QUALITY_DETAILS_JSON_LIMIT" --focus "$OPL_QUALITY_DETAILS_FOCUS" "${compare_args[@]}" > "$OPL_QUALITY_DETAILS_OUTPUT_DIR/quality-details.json"
