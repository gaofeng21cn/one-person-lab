name: OPL Full First-Install Release

on:
  workflow_dispatch:
    inputs:
      opl_version:
        description: OPL version to publish, for example 26.5.1
        required: true
        type: string
      publish_to_release:
        description: Upload Full first-install assets to an existing GitHub Release
        required: false
        default: false
        type: boolean
      force_rebuild_runtime_cache:
        description: Ignore restored Full runtime layer cache and rebuild all layers
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  full-first-install:
    name: Build Full first-install package
    runs-on: macos-14
    timeout-minutes: 150

    steps:
      - name: Checkout OPL
        uses: actions/checkout@v4
        with:
          path: one-person-lab

      - name: Checkout OPL GUI shell
        uses: actions/checkout@v4
        with:
          repository: gaofeng21cn/opl-aion-shell
          ref: main
          path: opl-aion-shell

      - name: Checkout Hermes-Agent
        uses: actions/checkout@v4
        with:
          repository: NousResearch/hermes-agent
          ref: main
          path: _external/hermes-agent

      - name: Checkout MAS
        uses: actions/checkout@v4
        with:
          repository: gaofeng21cn/med-autoscience
          ref: main
          path: med-autoscience

      - name: Checkout MDS
        uses: actions/checkout@v4
        with:
          repository: gaofeng21cn/med-deepscientist
          ref: main
          path: med-deepscientist

      - name: Resolve release version
        shell: bash
        run: |
          set -euo pipefail
          echo "OPL_RELEASE_VERSION=${{ inputs.opl_version }}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: one-person-lab/package-lock.json

      - name: Setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv and Codex CLI
        shell: bash
        run: |
          set -euo pipefail
          brew install zstd || true
          python -m pip install --upgrade pip uv
          uv python install 3.12
          npm install -g @openai/codex
          codex --version
          uv --version
          zstd --version

      - name: Install OPL dependencies
        working-directory: one-person-lab
        run: npm ci

      - name: Build OPL CLI
        working-directory: one-person-lab
        run: npm run build

      - name: Install GUI dependencies
        working-directory: opl-aion-shell
        shell: bash
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run postinstall || true
          bunx electron-builder install-app-deps

      - name: Prepare Python runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          uv sync --project _external/hermes-agent --extra cron --extra cli --extra pty --extra mcp --extra honcho --extra acp --no-dev
          uv sync --project med-autoscience --no-dev
          uv sync --project med-deepscientist --no-dev

      - name: Resolve Full runtime cache keys
        id: runtime-cache-keys
        working-directory: one-person-lab
        shell: bash
        run: |
          set -euo pipefail
          cache_dir="$GITHUB_WORKSPACE/.opl-full-runtime-cache"
          export OPL_FULL_CODEX_ROOT="$(npm root -g)/@openai/codex"
          export OPL_FULL_UV_BIN="$(command -v uv)"
          export OPL_FULL_HERMES_ROOT="$GITHUB_WORKSPACE/_external/hermes-agent"
          export OPL_FULL_MAS_ROOT="$GITHUB_WORKSPACE/med-autoscience"
          export OPL_FULL_MDS_ROOT="$GITHUB_WORKSPACE/med-deepscientist"
          npm --silent run packages:full-release -- \
            --version "$OPL_RELEASE_VERSION" \
            --runtime-cache-dir "$cache_dir" \
            --runtime-cache-mode readwrite \
            --print-runtime-cache-keys > "$RUNNER_TEMP/opl-full-runtime-cache-keys.json"
          cat "$RUNNER_TEMP/opl-full-runtime-cache-keys.json"
          digest="$(shasum -a 256 "$RUNNER_TEMP/opl-full-runtime-cache-keys.json" | awk '{print $1}')"
          cache_key="opl-full-runtime-layers-${RUNNER_OS}-${RUNNER_ARCH}-${digest}"
          echo "cache_dir=$cache_dir" >> "$GITHUB_OUTPUT"
          echo "cache_digest=$digest" >> "$GITHUB_OUTPUT"
          echo "cache_key=$cache_key" >> "$GITHUB_OUTPUT"

      - name: Restore Full runtime layer cache
        if: ${{ !inputs.force_rebuild_runtime_cache }}
        id: restore-runtime-cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ steps.runtime-cache-keys.outputs.cache_dir }}
          key: ${{ steps.runtime-cache-keys.outputs.cache_key }}
          restore-keys: |
            opl-full-runtime-layers-${{ runner.os }}-${{ runner.arch }}-

      - name: Reset Full runtime layer cache when forced
        if: ${{ inputs.force_rebuild_runtime_cache }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${{ steps.runtime-cache-keys.outputs.cache_dir }}"
          mkdir -p "${{ steps.runtime-cache-keys.outputs.cache_dir }}"

      - name: Prepare optional macOS code signing
        shell: bash
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'temp-keychain-password' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          IDENTITY: ${{ secrets.IDENTITY }}
        run: |
          set -euo pipefail
          echo "OPL_MAC_STRICT_SIGNING_CHECKS=false" >> "$GITHUB_ENV"
          echo "OPL_FULL_PACKAGE_NOTARIZED=false" >> "$GITHUB_ENV"

          if [ -z "${BUILD_CERTIFICATE_BASE64:-}" ] || [ -z "${P12_PASSWORD:-}" ]; then
            echo "::notice::No Developer ID certificate secrets configured; building the Full DMG with the same unsigned packaging mode as the current standard GitHub release."
            exit 0
          fi

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

          if [ -n "${APPLE_ID:-}" ] && [ -n "${APPLE_ID_PASSWORD:-}" ] && [ -n "${TEAM_ID:-}" ] && [ -n "${IDENTITY:-}" ]; then
            echo "OPL_MAC_STRICT_SIGNING_CHECKS=true" >> "$GITHUB_ENV"
            echo "OPL_FULL_PACKAGE_NOTARIZED=true" >> "$GITHUB_ENV"
          else
            echo "::notice::Developer ID certificate is available, but notarization identity secrets are incomplete; strict Gatekeeper verification will be skipped."
          fi

      - name: Build Full first-install package
        working-directory: one-person-lab
        shell: bash
        env:
          OPL_RELEASE_VERSION: ${{ env.OPL_RELEASE_VERSION }}
          APP_ID: ${{ secrets.APP_ID }}
          appleId: ${{ secrets.APPLE_ID }}
          appleIdPassword: ${{ secrets.APPLE_ID_PASSWORD }}
          teamId: ${{ secrets.TEAM_ID }}
          identity: ${{ secrets.IDENTITY }}
          CSC_NAME: ${{ secrets.IDENTITY }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ulimit -n 65536 || true
          export OPL_FULL_CODEX_ROOT="$(npm root -g)/@openai/codex"
          export OPL_FULL_UV_BIN="$(command -v uv)"
          export OPL_FULL_HERMES_ROOT="$GITHUB_WORKSPACE/_external/hermes-agent"
          export OPL_FULL_MAS_ROOT="$GITHUB_WORKSPACE/med-autoscience"
          export OPL_FULL_MDS_ROOT="$GITHUB_WORKSPACE/med-deepscientist"
          npm run packages:full-release -- \
            --version "$OPL_RELEASE_VERSION" \
            --runtime-cache-dir "${{ steps.runtime-cache-keys.outputs.cache_dir }}" \
            --runtime-cache-mode readwrite

      - name: Verify Full package checksums and optional signing
        shell: bash
        run: |
          set -euo pipefail
          app_path="$GITHUB_WORKSPACE/opl-aion-shell/out/mac-arm64/One Person Lab.app"
          dmg_path="$GITHUB_WORKSPACE/one-person-lab/dist/opl-full-release/One-Person-Lab-Full-${OPL_RELEASE_VERSION}-mac-arm64.dmg"
          if [ "${OPL_MAC_STRICT_SIGNING_CHECKS:-false}" = "true" ]; then
            codesign --verify --deep --strict --verbose=2 "$app_path"
            spctl --assess --type execute --verbose=4 "$app_path"
          else
            echo "::notice::Skipping strict codesign/spctl checks because this run is matching the current unsigned standard release mode."
            codesign --verify --deep --strict --verbose=2 "$app_path" || true
            spctl --assess --type execute --verbose=4 "$app_path" || true
          fi
          hdiutil verify "$dmg_path"
          (cd "$GITHUB_WORKSPACE/one-person-lab/dist/opl-full-release" && shasum -a 256 -c SHA256SUMS.txt)

      - name: Save Full runtime layer cache
        if: ${{ inputs.force_rebuild_runtime_cache || steps.restore-runtime-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: ${{ steps.runtime-cache-keys.outputs.cache_dir }}
          key: ${{ steps.runtime-cache-keys.outputs.cache_key }}

      - name: Verify release upload plan
        working-directory: one-person-lab
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run gui:release -- \
            --no-build \
            --dry-run \
            --shell-root "$GITHUB_WORKSPACE/opl-aion-shell" \
            --version "$OPL_RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --full-package-only \
            --include-full-package

      - name: Verify existing standard updater metadata
        if: ${{ inputs.publish_to_release }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          gh release view "v${OPL_RELEASE_VERSION}" --repo "$GITHUB_REPOSITORY" --json tagName >/dev/null
          gh release download "v${OPL_RELEASE_VERSION}" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern 'latest*.yml' \
            --dir "$tmpdir"
          if grep -R "One-Person-Lab-Full" "$tmpdir"/latest*.yml; then
            echo "::error::existing updater metadata must not reference Full assets"
            exit 1
          fi

      - name: Upload Full package workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: opl-full-first-install-${{ env.OPL_RELEASE_VERSION }}-mac-arm64
          path: one-person-lab/dist/opl-full-release
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub Release assets
        if: ${{ inputs.publish_to_release }}
        working-directory: one-person-lab
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run gui:release -- \
            --no-build \
            --shell-root "$GITHUB_WORKSPACE/opl-aion-shell" \
            --version "$OPL_RELEASE_VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --full-package-only \
            --include-full-package

      - name: Clean up keychain
        if: always()
        run: |
          if security list-keychains | grep -q build.keychain; then
            security delete-keychain build.keychain
          fi
