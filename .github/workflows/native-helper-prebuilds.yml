name: Native Helper Prebuilds

on:
  workflow_dispatch:
    inputs:
      include-linux:
        description: Build Linux native helper prebuilds
        required: false
        default: 'false'
        type: boolean
      include-windows:
        description: Build Windows native helper prebuilds
        required: false
        default: 'false'
        type: boolean
  pull_request:
    paths:
      - Cargo.lock
      - Cargo.toml
      - native/opl-native-helper/**
      - scripts/native-helper-prebuild.mjs
      - .github/workflows/native-helper-prebuilds.yml
  push:
    branches:
      - main
    paths:
      - Cargo.lock
      - Cargo.toml
      - native/opl-native-helper/**
      - scripts/native-helper-prebuild.mjs
      - .github/workflows/native-helper-prebuilds.yml

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  packages: write

jobs:
  plan-native-helper-prebuilds:
    name: Plan native helper prebuilds
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}

    steps:
      - name: Select prebuild platforms
        id: plan
        shell: bash
        run: |
          set -euo pipefail
          platforms='["macos-latest"'
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include-linux }}" = "true" ]; then
            platforms="${platforms},\"ubuntu-latest\""
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.include-windows }}" = "true" ]; then
            platforms="${platforms},\"windows-latest\""
          fi
          platforms="${platforms}]"
          printf 'matrix={"os":%s}\n' "$platforms" >> "$GITHUB_OUTPUT"

  pack-native-helper:
    name: Pack native helper prebuild (${{ matrix.os }})
    needs: plan-native-helper-prebuilds
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan-native-helper-prebuilds.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install dependencies
        run: npm ci

      - name: Build release native helpers
        run: cargo build --release --workspace

      - name: Pack native helper prebuild
        shell: bash
        run: |
          set -euo pipefail
          target_triple="$(node -p "process.platform + '-' + process.arch")"
          npm run native:prebuild-pack -- --source-dir target/release --prebuild-root dist/native-helper-prebuilds --target "$target_triple"
          npm run native:prebuild-check -- --prebuild-root dist/native-helper-prebuilds --target "$target_triple"
          npm run native:prebuild-archive -- --prebuild-root dist/native-helper-prebuilds --target "$target_triple"

      - name: Validate native helper package retention policy
        shell: bash
        run: |
          set -euo pipefail
          node --experimental-strip-types --input-type=module <<'NODE'
          import { buildOplPackageManifest } from './src/modules/connect/package-distribution.ts';

          const nativeHelper = buildOplPackageManifest().packages.native_helper;
          if (nativeHelper.channel_status !== 'active_ghcr_oci_prebuild') {
            throw new Error('native helper package must remain active_ghcr_oci_prebuild');
          }
          if (nativeHelper.retention_policy?.execution_mode !== 'dry_run_first_explicit_execute_required') {
            throw new Error('native helper retention cleanup must remain dry-run first');
          }
          if (!nativeHelper.required_gates?.includes('retention_policy_recorded')) {
            throw new Error('native helper required gates must include retention_policy_recorded');
          }
          if (!nativeHelper.required_gates?.includes('ghcr_oci_archive_pushed')) {
            throw new Error('native helper required gates must include ghcr_oci_archive_pushed');
          }
          NODE

      - name: Upload native helper prebuild
        uses: actions/upload-artifact@v7
        with:
          name: opl-native-helper-prebuild-${{ runner.os }}-${{ runner.arch }}
          path: dist/native-helper-prebuilds
          if-no-files-found: error

      - name: Upload native helper release archive
        uses: actions/upload-artifact@v7
        with:
          name: opl-native-helper-release-archive-${{ runner.os }}-${{ runner.arch }}
          path: dist/native-helper-prebuilds/archives/*.tar.gz
          if-no-files-found: error

      - name: Setup ORAS
        if: github.event_name != 'pull_request'
        uses: oras-project/setup-oras@v1

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Push native helper archive to GHCR
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail
          helper_version="$(node -e "const fs=require('fs'); const raw=fs.readFileSync('native/opl-native-helper/Cargo.toml','utf8'); console.log(raw.match(/^version\\s*=\\s*\"([^\"]+)\"/m)[1])")"
          target_triple="$(node -p "process.platform + '-' + process.arch")"
          archive="dist/native-helper-prebuilds/archives/opl-native-helper-${target_triple}-${helper_version}.tar.gz"
          oras push \
            "ghcr.io/${{ github.repository_owner }}/one-person-lab-native-helper:${target_triple}-${helper_version}" \
            "$archive:application/vnd.onepersonlab.native-helper.v1+gzip" \
            --annotation "org.opencontainers.image.title=one-person-lab-native-helper" \
            --annotation "org.opencontainers.image.version=${helper_version}" \
            --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}"
