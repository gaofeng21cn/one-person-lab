name: Prepare OPL Package Artifacts

on:
  workflow_dispatch:
    inputs:
      opl_version:
        description: OPL version to prepare, for example 26.4.27
        required: true
        type: string
      release_gate:
        description: Manual repair reason or release gate that authorized package publication
        required: false
        type: string
        default: manual_dispatch
  workflow_call:
    inputs:
      opl_version:
        description: OPL version to prepare, for example 26.4.27
        required: true
        type: string
      release_gate:
        description: Release gate or workflow that authorized package publication
        required: true
        type: string

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  module-packages:
    name: Prepare package source archives
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout OPL
        uses: actions/checkout@v6

      - name: Resolve OPL version
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.opl_version }}" ]; then
            version="${{ inputs.opl_version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          version="${version#v}"
          echo "OPL_RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "OPL_PACKAGES_OWNER=${{ github.repository_owner }}" >> "$GITHUB_ENV"
          echo "OPL_PACKAGE_RELEASE_GATE=${{ inputs.release_gate }}" >> "$GITHUB_ENV"

      - name: Record package publication gate
        shell: bash
        run: |
          set -euo pipefail
          test -n "$OPL_PACKAGE_RELEASE_GATE"
          printf 'release_gate=%s\n' "$OPL_PACKAGE_RELEASE_GATE"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build module archives and release manifest
        run: npm run packages:manifest -- --version "$OPL_RELEASE_VERSION" --owner "$OPL_PACKAGES_OWNER" --out-dir dist/opl-packages

      - name: Check package release discipline
        run: npm run packages:release-discipline -- --manifest dist/opl-packages/opl-release-manifest.json

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Publish module package channel to GHCR
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          for archive in dist/opl-packages/modules/*.tar.gz; do
            module_name="$(basename "$archive" "-${OPL_RELEASE_VERSION}.tar.gz")"
            image="ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-modules/${module_name}"
            oras push "${image}:${OPL_RELEASE_VERSION}" \
              --artifact-type application/vnd.onepersonlab.module.source.v1 \
              "${archive}:application/vnd.onepersonlab.module.source.v1+gzip"
          done
          framework_archive="dist/opl-packages/framework/one-person-lab-framework-${OPL_RELEASE_VERSION}.tar.gz"
          test -f "$framework_archive"
          oras push "ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-framework:${OPL_RELEASE_VERSION}" \
            --artifact-type application/vnd.onepersonlab.framework.source.v1 \
            "${framework_archive}:application/vnd.onepersonlab.framework.source.v1+gzip"
          oras push "ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-manifest:${OPL_RELEASE_VERSION}" \
            --artifact-type application/vnd.onepersonlab.release.manifest.v1 \
            "dist/opl-packages/opl-release-manifest.json:application/vnd.onepersonlab.release.manifest.v1+json" \
            "dist/opl-packages/opl-channel-manifest.json:application/vnd.onepersonlab.release.channel-manifest.v1+json" \
            "dist/opl-packages/SHA256SUMS:text/plain"
          oras tag "ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-manifest:${OPL_RELEASE_VERSION}" stable
          oras tag "ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-manifest:${OPL_RELEASE_VERSION}" latest

      - name: Upload prepared package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: opl-release-manifest-${{ env.OPL_RELEASE_VERSION }}
          path: dist/opl-packages
          if-no-files-found: error
