name: Publish OPL Package Release Set
run-name: OPL candidate ${{ inputs.release_set_generation }} / ${{ inputs.promotion_request_id || github.run_id }}

on:
  workflow_dispatch:
    inputs:
      release_set_generation:
        description: Release Set generation, for example 26.7.12 or 26.7.12-r2
        required: true
        type: string
      expected_framework_source_commit:
        description: Exact 40-character Framework source commit that this workflow must execute
        required: true
        type: string
      release_gate:
        description: Manual repair reason or release gate that authorized publication
        required: false
        type: string
        default: manual_dispatch
      changed_packages_json:
        description: Optional JSON array of canonical Package ids; actual changed ids cannot be omitted
        required: false
        type: string
        default: ''
      promotion_target:
        description: Immutable publication always updates candidate; stable promotion is a separate exact-digest workflow
        required: false
        type: choice
        options: [candidate]
        default: candidate
      app_version:
        description: Exact OPL App CalVer to include; empty reuses stable BOM or resolves latest published App
        required: false
        type: string
        default: ''
      promotion_request_id:
        description: Cross-repository saga correlation id
        required: false
        type: string
        default: ''
      source_app_run_id:
        description: App workflow run that owns the release saga
        required: false
        type: string
        default: ''
      expected_app_source_commit:
        description: Exact App source commit expected by the caller
        required: false
        type: string
        default: ''
      expected_app_artifact_digest:
        description: Exact primary App artifact digest expected by the caller
        required: false
        type: string
        default: ''
      owner_cohort_artifact_name:
        description: Same-run artifact containing owner-cohort-lock.json from detection
        required: false
        type: string
        default: ''
  workflow_call:
    inputs:
      release_set_generation:
        description: Release Set generation, for example 26.7.12 or 26.7.12-r2
        required: true
        type: string
      expected_framework_source_commit:
        description: Exact 40-character Framework source commit that this workflow must execute
        required: true
        type: string
      release_gate:
        description: Release gate or workflow that authorized publication
        required: true
        type: string
      changed_packages_json:
        description: Optional JSON array of canonical Package ids; actual changed ids cannot be omitted
        required: false
        type: string
        default: ''
      promotion_target:
        description: Immutable publication target; must be candidate
        required: false
        type: string
        default: candidate
      app_version:
        description: Exact OPL App CalVer to include; empty reuses stable BOM or resolves latest published App
        required: false
        type: string
        default: ''
      promotion_request_id:
        description: Cross-repository saga correlation id
        required: false
        type: string
        default: ''
      source_app_run_id:
        description: App workflow run that owns the release saga
        required: false
        type: string
        default: ''
      expected_app_source_commit:
        description: Exact App source commit expected by the caller
        required: false
        type: string
        default: ''
      expected_app_artifact_digest:
        description: Exact primary App artifact digest expected by the caller
        required: false
        type: string
        default: ''
      owner_cohort_artifact_name:
        description: Same-run artifact containing owner-cohort-lock.json from detection
        required: false
        type: string
        default: ''

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: opl-package-publication-${{ github.repository_owner }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  package-release-set:
    name: Publish immutable Package Release Set
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      OPL_RELEASE_HARNESS_ROOT: ${{ github.workspace }}/.release-harness
      OPL_FRAMEWORK_SOURCE_ROOT: ${{ github.workspace }}/.framework-source
    outputs:
      release_set_generation: ${{ steps.release.outputs.release_set_generation }}
      promotion_request_id: ${{ steps.release.outputs.promotion_request_id }}
    steps:
      - name: Checkout exact release harness
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          path: .release-harness

      - name: Checkout frozen Framework source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.expected_framework_source_commit }}
          path: .framework-source

      - name: Verify exact release roots
        shell: bash
        env:
          EXPECTED_FRAMEWORK_SOURCE_COMMIT: ${{ inputs.expected_framework_source_commit }}
        run: |
          set -euo pipefail
          expected="$EXPECTED_FRAMEWORK_SOURCE_COMMIT"
          if ! [[ "$expected" =~ ^[0-9a-f]{40}$ ]]; then
            echo "::error::expected_framework_source_commit must be one exact lowercase 40-character Git SHA."
            exit 1
          fi
          harness_head="$(git -C "$OPL_RELEASE_HARNESS_ROOT" rev-parse --verify HEAD)"
          source_head="$(git -C "$OPL_FRAMEWORK_SOURCE_ROOT" rev-parse --verify HEAD)"
          if [ "$harness_head" != "$GITHUB_SHA" ]; then
            echo "::error::Release harness HEAD $harness_head does not match workflow SHA $GITHUB_SHA."
            exit 1
          fi
          if [ "$source_head" != "$expected" ]; then
            echo "::error::Frozen Framework HEAD $source_head does not match expected commit $expected."
            exit 1
          fi
          if [ "$(cd "$OPL_RELEASE_HARNESS_ROOT" && pwd -P)" = "$(cd "$OPL_FRAMEWORK_SOURCE_ROOT" && pwd -P)" ]; then
            echo "::error::Release harness and frozen Framework source must use separate roots."
            exit 1
          fi

      - name: Resolve Release Set generation
        id: release
        shell: bash
        run: |
          set -euo pipefail
          generation="${{ inputs.release_set_generation }}"
          generation="${generation#v}"
          if ! [[ "$generation" =~ ^[0-9]{2}\.[0-9]{1,2}\.[0-9]{1,2}(-r[1-9][0-9]*)?$ ]]; then
            echo "::error::Invalid Release Set generation: $generation"
            exit 1
          fi
          promotion_target="${{ inputs.promotion_target }}"
          [ "$promotion_target" = candidate ] || { echo "::error::Use release-package-channel.yml to promote an existing immutable BOM to latest-stable."; exit 2; }
          generated_at="$(git -C "$OPL_FRAMEWORK_SOURCE_ROOT" show -s --format=%cI HEAD)"
          request_id="${{ inputs.promotion_request_id }}"
          if [ -z "$request_id" ]; then request_id="run-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"; fi
          [[ "$request_id" =~ ^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$ ]] || { echo "::error::Invalid promotion request id: $request_id"; exit 1; }
          {
            echo "OPL_RELEASE_SET_GENERATION=$generation"
            echo "OPL_RELEASE_SET_GENERATED_AT=$generated_at"
            echo "OPL_PACKAGES_OWNER=${{ github.repository_owner }}"
            echo "OPL_PACKAGE_RELEASE_GATE=${{ inputs.release_gate }}"
            echo "OPL_PACKAGE_PROMOTION_TARGET=$promotion_target"
            echo "OPL_OCI_SOURCE_URL=https://github.com/${GITHUB_REPOSITORY}"
            echo "OPL_PROMOTION_REQUEST_ID=$request_id"
            echo "OPL_SOURCE_APP_RUN_ID=${{ inputs.source_app_run_id }}"
          } >> "$GITHUB_ENV"
          {
            echo "release_set_generation=$generation"
            echo "promotion_request_id=$request_id"
          } >> "$GITHUB_OUTPUT"

      - name: Record package publication gate
        shell: bash
        run: |
          set -euo pipefail
          test -n "$OPL_PACKAGE_RELEASE_GATE"
          printf 'release_gate=%s\nrelease_set_generation=%s\n' \
            "$OPL_PACKAGE_RELEASE_GATE" "$OPL_RELEASE_SET_GENERATION"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            .release-harness/package-lock.json
            .framework-source/package-lock.json

      - name: Install release harness dependencies
        working-directory: .release-harness
        run: npm ci --ignore-scripts

      - name: Install frozen Framework dependencies
        working-directory: .framework-source
        run: npm ci --ignore-scripts

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Download frozen owner cohort
        if: inputs.owner_cohort_artifact_name != ''
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.owner_cohort_artifact_name }}
          path: ${{ runner.temp }}/opl-owner-cohort

      - name: Bind frozen owner cohort
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.owner_cohort_artifact_name }}" ]; then
            lock="$(find "$RUNNER_TEMP/opl-owner-cohort" -name owner-cohort-lock.json -print -quit)"
          else
            lock="$OPL_RELEASE_HARNESS_ROOT/release/cohorts/$OPL_RELEASE_SET_GENERATION/owner-cohort-lock.json"
          fi
          if [ -z "$lock" ] || [ ! -f "$lock" ]; then
            echo "::error::Release Set $OPL_RELEASE_SET_GENERATION has no frozen owner cohort lock."
            exit 1
          fi
          echo "OPL_PACKAGE_OWNER_COHORT_LOCK=$lock" >> "$GITHUB_ENV"

      - name: Fetch previous latest-stable Release Set
        shell: bash
        run: |
          set -euo pipefail
          previous_root="$RUNNER_TEMP/opl-previous-release-set"
          rm -rf "$previous_root"
          mkdir -p "$previous_root"
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          if oras pull "ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-manifest:latest-stable" --output "$previous_root"; then
            previous="$(find "$previous_root" -name opl-channel-manifest.json -print -quit)"
            test -n "$previous"
            echo "OPL_PREVIOUS_PACKAGE_MANIFEST=$previous" >> "$GITHUB_ENV"
          else
            echo "::notice::No previous latest-stable Release Set is available; this run must publish all seven Packages."
          fi

      - name: Resolve immutable OPL App component
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requested="${{ inputs.app_version }}"
          if [ -n "$requested" ]; then
            app_version="${requested#v}"
          elif [ -n "${OPL_PREVIOUS_PACKAGE_MANIFEST:-}" ] \
            && [ "$(jq -r '.release_set.surface_kind // empty' "$OPL_PREVIOUS_PACKAGE_MANIFEST")" = opl_release_set.v2 ]; then
            app_version="$(jq -r '.release_set.components.app.version' "$OPL_PREVIOUS_PACKAGE_MANIFEST")"
          else
            app_version="$(gh release list --repo gaofeng21cn/one-person-lab-app --limit 50 \
              --json tagName,isDraft,isPrerelease,publishedAt \
              --jq '[.[] | select(.isDraft == false and .isPrerelease == false and .publishedAt != null)][0].tagName' | sed 's/^v//')"
          fi
          [[ "$app_version" =~ ^[0-9]{2}\.[0-9]{1,2}\.[0-9]{1,2}$ ]]
          gh release view "v$app_version" --repo gaofeng21cn/one-person-lab-app \
            --json tagName,isDraft,isPrerelease,publishedAt,targetCommitish,assets,url \
            > "$RUNNER_TEMP/opl-app-release.json"
          owner_manifest=""
          mkdir -p "$RUNNER_TEMP/opl-app-owner-component"
          if gh release download "v$app_version" --repo gaofeng21cn/one-person-lab-app \
            --pattern opl-app-component-manifest.json --dir "$RUNNER_TEMP/opl-app-owner-component"; then
            owner_manifest="$RUNNER_TEMP/opl-app-owner-component/opl-app-component-manifest.json"
          else
            echo "::notice::Historical App release has no owner component manifest; using exact public release readback projection."
          fi
          app_commit="${{ inputs.expected_app_source_commit }}"
          if [ -z "$app_commit" ] && [ -n "$owner_manifest" ]; then
            app_commit="$(jq -r .source_commit "$owner_manifest")"
          fi
          if [ -z "$app_commit" ]; then
            app_commit="$(gh api "repos/gaofeng21cn/one-person-lab-app/commits/v$app_version" --jq .sha)"
          fi
          [[ "$app_commit" =~ ^[0-9a-f]{40}$ ]]
          component_args=(
            --release-json "$RUNNER_TEMP/opl-app-release.json" \
            --source-commit "$app_commit" \
            --output "$RUNNER_TEMP/opl-app-component-manifest.json"
          )
          [ -z "$owner_manifest" ] || component_args+=(--owner-manifest "$owner_manifest")
          node "$OPL_RELEASE_HARNESS_ROOT/scripts/resolve-opl-app-component.mjs" "${component_args[@]}"
          resolved_version="$(jq -r .version "$RUNNER_TEMP/opl-app-component-manifest.json")"
          resolved_commit="$(jq -r .source_commit "$RUNNER_TEMP/opl-app-component-manifest.json")"
          resolved_digest="$(jq -r .primary_artifact.digest "$RUNNER_TEMP/opl-app-component-manifest.json")"
          expected_version="${{ inputs.app_version }}"
          expected_version="${expected_version#v}"
          expected_commit="${{ inputs.expected_app_source_commit }}"
          expected_digest="${{ inputs.expected_app_artifact_digest }}"
          [ -z "$expected_version" ] || [ "$resolved_version" = "$expected_version" ]
          [ -z "$expected_commit" ] || [ "$resolved_commit" = "$expected_commit" ]
          [ -z "$expected_digest" ] || [ "$resolved_digest" = "$expected_digest" ]
          echo "OPL_APP_COMPONENT_MANIFEST=$RUNNER_TEMP/opl-app-component-manifest.json" >> "$GITHUB_ENV"

      - name: Build Package archives and Release Set manifests
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --release-set-generation "$OPL_RELEASE_SET_GENERATION"
            --generated-at "$OPL_RELEASE_SET_GENERATED_AT"
            --owner "$OPL_PACKAGES_OWNER"
            --out-dir dist/opl-packages
            --app-component-manifest "$OPL_APP_COMPONENT_MANIFEST"
            --framework-source-root "$OPL_FRAMEWORK_SOURCE_ROOT"
          )
          if [ -n "${OPL_PREVIOUS_PACKAGE_MANIFEST:-}" ]; then
            args+=(--previous-manifest "$OPL_PREVIOUS_PACKAGE_MANIFEST")
          fi
          if [ -n "${OPL_PACKAGE_OWNER_COHORT_LOCK:-}" ]; then
            args+=(--owner-cohort-lock "$OPL_PACKAGE_OWNER_COHORT_LOCK")
          fi
          node --experimental-strip-types "$OPL_RELEASE_HARNESS_ROOT/scripts/package-archives.mjs" "${args[@]}"

      - name: Resolve changed Package publication plan
        shell: bash
        run: |
          set -euo pipefail
          requested='${{ inputs.changed_packages_json }}'
          catalog_ids="$(jq -c '.packages.package_catalog | keys' dist/opl-packages/opl-channel-manifest.json)"
          if [ -n "${OPL_PREVIOUS_PACKAGE_MANIFEST:-}" ]; then
            node "$OPL_RELEASE_HARNESS_ROOT/scripts/package-channel-daily-check.mjs" \
              --candidate-manifest dist/opl-packages/opl-channel-manifest.json \
              --current-manifest "$OPL_PREVIOUS_PACKAGE_MANIFEST" \
              --release-set-generation "$OPL_RELEASE_SET_GENERATION" \
              --summary-path dist/opl-packages/package-publication-plan.json
            computed="$(jq -c '.changed_packages' dist/opl-packages/package-publication-plan.json)"
          else
            computed="$catalog_ids"
          fi
          if [ -n "$requested" ]; then
            jq -e 'type == "array" and all(.[]; type == "string")' <<<"$requested" >/dev/null
            invalid="$(jq -cn --argjson requested "$requested" --argjson catalog "$catalog_ids" '$requested - $catalog')"
            omitted="$(jq -cn --argjson computed "$computed" --argjson requested "$requested" '$computed - $requested')"
            test "$(jq 'length' <<<"$invalid")" -eq 0 || { echo "::error::Unknown Package ids: $invalid"; exit 1; }
            test "$(jq 'length' <<<"$omitted")" -eq 0 || { echo "::error::Changed Package ids omitted by request: $omitted"; exit 1; }
            changed_packages_json="$(jq -c 'unique | sort' <<<"$requested")"
          else
            changed_packages_json="$computed"
          fi
          echo "OPL_CHANGED_PACKAGES_JSON=$changed_packages_json" >> "$GITHUB_ENV"

      - name: Check Package release discipline
        run: node "$OPL_RELEASE_HARNESS_ROOT/scripts/package-release-discipline.mjs" --manifest dist/opl-packages/opl-release-manifest.json --promotion-target "$OPL_PACKAGE_PROMOTION_TARGET"

      - name: Publish immutable Packages and finalize complete BOM
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          ensure_public_package() {
            local package_name="$1"
            local encoded readback attempt
            encoded="$(jq -rn --arg value "$package_name" '$value|@uri')"
            for attempt in {1..24}; do
              if readback="$(gh api "/users/${OPL_PACKAGES_OWNER}/packages/container/${encoded}" 2>/dev/null)" \
                && jq -e --arg repo "$GITHUB_REPOSITORY" \
                  '.visibility == "public" and .repository.full_name == $repo' <<<"$readback" >/dev/null; then
                return 0
              fi
              gh api --method PATCH "/user/packages/container/${encoded}/visibility" \
                -f visibility=public >/dev/null 2>&1 || true
              if [ "$attempt" -eq 24 ]; then
                echo "::error::GHCR package is not public or is not associated with ${GITHUB_REPOSITORY}: ${package_name}"
                return 1
              fi
              sleep 5
            done
          }

          package_preflight_args() {
            local package_root="$1"
            local package_id="$2"
            local package_version="$3"
            local archive="$package_root/${package_id}-${package_version}.tar.gz"
            printf '%s\n' \
              --artifact-type application/vnd.onepersonlab.package.v1 \
              --source-url "$OPL_OCI_SOURCE_URL" \
              --layer "${archive}=application/vnd.onepersonlab.package.source.v1+gzip" \
              --layer "${package_root}/package-manifest.json=application/vnd.onepersonlab.package.manifest.v1+json" \
              --layer "${package_root}/payload-manifest.json=application/vnd.onepersonlab.package.payload.v1+json"
          }

          changed_packages_json="$OPL_CHANGED_PACKAGES_JSON"
          for package_root in dist/opl-packages/packages/*; do
            package_id="$(basename "$package_root")"
            if ! jq -e --arg id "$package_id" 'index($id) != null' <<<"$changed_packages_json" >/dev/null; then
              continue
            fi
            package_version="$(jq -r --arg id "$package_id" '.release_set.components.packages.members[$id].package_version' dist/opl-packages/opl-release-manifest.json)"
            archive="$package_root/${package_id}-${package_version}.tar.gz"
            image="ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-packages/${package_id}"
            mapfile -t preflight_args < <(package_preflight_args "$package_root" "$package_id" "$package_version")
            preflight="$(node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" \
              --ref "${image}:${package_version}" "${preflight_args[@]}")"
            action="$(jq -r '.action' <<<"$preflight")"
            if [ "$action" = reuse ]; then
              digest="$(jq -r '.digest' <<<"$preflight")"
            else
              push_result="$(oras push --format json "${image}:${package_version}" \
                --artifact-type application/vnd.onepersonlab.package.v1 \
                --annotation "org.opencontainers.image.source=${OPL_OCI_SOURCE_URL}" \
                "${archive}:application/vnd.onepersonlab.package.source.v1+gzip" \
                "${package_root}/package-manifest.json:application/vnd.onepersonlab.package.manifest.v1+json" \
                "${package_root}/payload-manifest.json:application/vnd.onepersonlab.package.payload.v1+json")"
              digest="$(jq -r '.digest' <<<"$push_result")"
            fi
            test "$digest" != null
            ensure_public_package "one-person-lab-packages/${package_id}"
            node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" \
              --ref "${image}:${package_version}" "${preflight_args[@]}" \
              --verify-only --expected-digest "$digest" --anonymous
            oras tag "${image}@${digest}" candidate
            node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" \
              --ref "${image}:candidate" "${preflight_args[@]}" \
              --verify-only --expected-digest "$digest" --anonymous
            node "$OPL_RELEASE_HARNESS_ROOT/scripts/finalize-package-channel-digests.mjs" \
              --release-manifest dist/opl-packages/opl-release-manifest.json \
              --channel-manifest dist/opl-packages/opl-channel-manifest.json \
              --package-id "$package_id" \
              --digest "$digest"
          done

          for package_root in dist/opl-packages/packages/*; do
            package_id="$(basename "$package_root")"
            package_version="$(jq -r --arg id "$package_id" '.release_set.components.packages.members[$id].package_version' dist/opl-packages/opl-release-manifest.json)"
            digest="$(jq -r --arg id "$package_id" '.release_set.components.packages.members[$id].oci_artifact_digest' dist/opl-packages/opl-release-manifest.json)"
            image="ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-packages/${package_id}"
            ensure_public_package "one-person-lab-packages/${package_id}"
            mapfile -t preflight_args < <(package_preflight_args "$package_root" "$package_id" "$package_version")
            node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" \
              --ref "${image}@${digest}" "${preflight_args[@]}" \
              --verify-only --expected-digest "$digest" --anonymous
            oras tag "${image}@${digest}" candidate
            node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" \
              --ref "${image}:candidate" "${preflight_args[@]}" \
              --verify-only --expected-digest "$digest" --anonymous
          done

          framework_version="$(jq -r '.release_set.components.base.version' dist/opl-packages/opl-release-manifest.json)"
          framework_archive="dist/opl-packages/framework/one-person-lab-framework-${framework_version}.tar.gz"
          framework_ref="$(jq -r '.release_set.components.base.artifact_ref' dist/opl-packages/opl-release-manifest.json)"
          framework_args=(
            --artifact-type application/vnd.onepersonlab.framework.source.v1
            --source-url "$OPL_OCI_SOURCE_URL"
            --layer "${framework_archive}=application/vnd.onepersonlab.framework.source.v1+gzip"
          )
          preflight="$(node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" --ref "$framework_ref" "${framework_args[@]}")"
          if [ "$(jq -r '.action' <<<"$preflight")" = reuse ]; then
            framework_digest="$(jq -r '.digest' <<<"$preflight")"
          else
            framework_push="$(oras push --format json "$framework_ref" \
              --artifact-type application/vnd.onepersonlab.framework.source.v1 \
              --annotation "org.opencontainers.image.source=${OPL_OCI_SOURCE_URL}" \
              "${framework_archive}:application/vnd.onepersonlab.framework.source.v1+gzip")"
            framework_digest="$(jq -r '.digest' <<<"$framework_push")"
          fi
          ensure_public_package one-person-lab-framework
          node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" --ref "$framework_ref" "${framework_args[@]}" \
            --verify-only --expected-digest "$framework_digest" --anonymous
          framework_image="${framework_ref%:*}"
          oras tag "${framework_image}@${framework_digest}" candidate
          node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" --ref "${framework_image}:candidate" "${framework_args[@]}" \
            --verify-only --expected-digest "$framework_digest" --anonymous
          node "$OPL_RELEASE_HARNESS_ROOT/scripts/finalize-package-channel-digests.mjs" \
            --release-manifest dist/opl-packages/opl-release-manifest.json \
            --channel-manifest dist/opl-packages/opl-channel-manifest.json \
            --component-id opl-base \
            --digest "$framework_digest"
          node "$OPL_RELEASE_HARNESS_ROOT/scripts/finalize-package-channel-digests.mjs" \
            --release-manifest dist/opl-packages/opl-release-manifest.json \
            --channel-manifest dist/opl-packages/opl-channel-manifest.json \
            --check

      - name: Generate Release Set SBOM and provenance
        run: node "$OPL_RELEASE_HARNESS_ROOT/scripts/generate-release-supply-chain.mjs" --release-manifest dist/opl-packages/opl-release-manifest.json --output-dir dist/opl-packages

      - name: Publish immutable Release Set catalog carrier
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ensure_public_package() {
            local package_name="$1"
            local encoded readback attempt
            encoded="$(jq -rn --arg value "$package_name" '$value|@uri')"
            for attempt in {1..24}; do
              if readback="$(gh api "/users/${OPL_PACKAGES_OWNER}/packages/container/${encoded}" 2>/dev/null)" \
                && jq -e --arg repo "$GITHUB_REPOSITORY" \
                  '.visibility == "public" and .repository.full_name == $repo' <<<"$readback" >/dev/null; then
                return 0
              fi
              gh api --method PATCH "/user/packages/container/${encoded}/visibility" \
                -f visibility=public >/dev/null 2>&1 || true
              if [ "$attempt" -eq 24 ]; then
                echo "::error::GHCR package is not public or is not associated with ${GITHUB_REPOSITORY}: ${package_name}"
                return 1
              fi
              sleep 5
            done
          }

          carrier="ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-manifest"
          generation_ref="${carrier}:${OPL_RELEASE_SET_GENERATION}"
          source_url="$OPL_OCI_SOURCE_URL"
          carrier_args=(
            --artifact-type application/vnd.onepersonlab.release.manifest.v1
            --source-url "$source_url"
            --layer "dist/opl-packages/opl-release-manifest.json=application/vnd.onepersonlab.release.manifest.v1+json"
            --layer "dist/opl-packages/opl-channel-manifest.json=application/vnd.onepersonlab.release.channel-manifest.v1+json"
            --layer "dist/opl-packages/owner-cohort-lock.json=application/vnd.onepersonlab.owner-cohort-lock.v1+json"
            --layer "dist/opl-packages/opl-release-set.spdx.json=application/spdx+json"
            --layer "dist/opl-packages/opl-release-provenance.json=application/vnd.in-toto+json"
            --layer "dist/opl-packages/SHA256SUMS=text/plain"
          )
          preflight="$(node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" --ref "$generation_ref" "${carrier_args[@]}")"
          if [ "$(jq -r '.action' <<<"$preflight")" = reuse ]; then
            digest="$(jq -r '.digest' <<<"$preflight")"
          else
            push_result="$(oras push --format json "$generation_ref" \
              --artifact-type application/vnd.onepersonlab.release.manifest.v1 \
              --annotation "org.opencontainers.image.source=${source_url}" \
              "dist/opl-packages/opl-release-manifest.json:application/vnd.onepersonlab.release.manifest.v1+json" \
              "dist/opl-packages/opl-channel-manifest.json:application/vnd.onepersonlab.release.channel-manifest.v1+json" \
              "dist/opl-packages/owner-cohort-lock.json:application/vnd.onepersonlab.owner-cohort-lock.v1+json" \
              "dist/opl-packages/opl-release-set.spdx.json:application/spdx+json" \
              "dist/opl-packages/opl-release-provenance.json:application/vnd.in-toto+json" \
              "dist/opl-packages/SHA256SUMS:text/plain")"
            digest="$(jq -r '.digest' <<<"$push_result")"
          fi
          ensure_public_package one-person-lab-manifest
          node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" --ref "$generation_ref" "${carrier_args[@]}" \
            --verify-only --expected-digest "$digest" --anonymous
          oras tag "${carrier}@${digest}" candidate
          node "$OPL_RELEASE_HARNESS_ROOT/scripts/oci-publication-preflight.mjs" --ref "${carrier}:candidate" "${carrier_args[@]}" \
            --verify-only --expected-digest "$digest" --anonymous
          echo "OPL_RELEASE_SET_CARRIER_REF=$generation_ref" >> "$GITHUB_ENV"
          echo "OPL_RELEASE_SET_CARRIER_DIGEST=$digest" >> "$GITHUB_ENV"

      - name: Attest exact Release Set files
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/opl-packages/framework/*.tar.gz
            dist/opl-packages/packages/*/*.tar.gz
            dist/opl-packages/opl-release-manifest.json
            dist/opl-packages/opl-channel-manifest.json
            dist/opl-packages/owner-cohort-lock.json
          predicate-type: https://slsa.dev/provenance/v1
          predicate-path: dist/opl-packages/opl-release-provenance.json

      - name: Attest Release Set SBOM
        uses: actions/attest@v4
        with:
          subject-path: |
            dist/opl-packages/framework/*.tar.gz
            dist/opl-packages/packages/*/*.tar.gz
            dist/opl-packages/opl-release-manifest.json
          sbom-path: dist/opl-packages/opl-release-set.spdx.json

      - name: Write candidate promotion receipt
        shell: bash
        run: |
          set -euo pipefail
          node "$OPL_RELEASE_HARNESS_ROOT/scripts/write-release-promotion-receipt.mjs" \
            --release-manifest dist/opl-packages/opl-release-manifest.json \
            --output dist/opl-packages/opl-release-promotion-receipt.json \
            --target candidate \
            --carrier-ref "$OPL_RELEASE_SET_CARRIER_REF" \
            --carrier-digest "$OPL_RELEASE_SET_CARRIER_DIGEST" \
            --promotion-request-id "$OPL_PROMOTION_REQUEST_ID" \
            --release-gate "$OPL_PACKAGE_RELEASE_GATE" \
            --source-app-run-id "${OPL_SOURCE_APP_RUN_ID:-}" \
            --framework-repository "$GITHUB_REPOSITORY" \
            --framework-run-id "$GITHUB_RUN_ID" \
            --framework-run-attempt "$GITHUB_RUN_ATTEMPT" \
            --expected-app-version "${{ inputs.app_version }}" \
            --expected-app-source-commit "${{ inputs.expected_app_source_commit }}" \
            --expected-app-artifact-digest "${{ inputs.expected_app_artifact_digest }}" \
            --anonymous-readback true

      - name: Upload prepared Package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: opl-release-set-${{ env.OPL_RELEASE_SET_GENERATION }}
          path: dist/opl-packages
          if-no-files-found: error

  attest-oci-components:
    name: Attest OCI ${{ matrix.component_id }}
    needs: package-release-set
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - component_id: opl-release-set
            image_suffix: one-person-lab-manifest
          - component_id: opl-base
            image_suffix: one-person-lab-framework
          - component_id: mas
            image_suffix: one-person-lab-packages/mas
          - component_id: mag
            image_suffix: one-person-lab-packages/mag
          - component_id: rca
            image_suffix: one-person-lab-packages/rca
          - component_id: oma
            image_suffix: one-person-lab-packages/oma
          - component_id: obf
            image_suffix: one-person-lab-packages/obf
          - component_id: mas-scholar-skills
            image_suffix: one-person-lab-packages/mas-scholar-skills
          - component_id: opl-flow
            image_suffix: one-person-lab-packages/opl-flow
    steps:
      - name: Download exact Release Set evidence
        uses: actions/download-artifact@v8
        with:
          name: opl-release-set-${{ needs.package-release-set.outputs.release_set_generation }}
          path: dist/opl-packages

      - name: Resolve exact OCI digest
        id: subject
        shell: bash
        run: |
          set -euo pipefail
          component_id="${{ matrix.component_id }}"
          if [ "$component_id" = opl-release-set ]; then
            digest="$(jq -r .carrier.digest dist/opl-packages/opl-release-promotion-receipt.json)"
          elif [ "$component_id" = opl-base ]; then
            digest="$(jq -r .release_set.components.base.artifact_digest dist/opl-packages/opl-release-manifest.json)"
          else
            digest="$(jq -r --arg id "$component_id" '.release_set.components.packages.members[$id].artifact_digest' dist/opl-packages/opl-release-manifest.json)"
          fi
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      - name: Publish OCI provenance referrer
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_suffix }}
          subject-digest: ${{ steps.subject.outputs.digest }}
          predicate-type: https://slsa.dev/provenance/v1
          predicate-path: dist/opl-packages/opl-release-provenance.json
          push-to-registry: true

      - name: Publish OCI SBOM referrer
        uses: actions/attest@v4
        with:
          subject-name: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_suffix }}
          subject-digest: ${{ steps.subject.outputs.digest }}
          sbom-path: dist/opl-packages/opl-release-set.spdx.json
          push-to-registry: true

  publish-candidate-receipt:
    name: Publish attested candidate receipt
    needs: [package-release-set, attest-oci-components]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Download attested Release Set evidence
        uses: actions/download-artifact@v8
        with:
          name: opl-release-set-${{ needs.package-release-set.outputs.release_set_generation }}
          path: dist/opl-packages

      - name: Upload candidate promotion receipt
        uses: actions/upload-artifact@v7
        with:
          name: opl-release-promotion-receipt-${{ needs.package-release-set.outputs.promotion_request_id }}-candidate
          path: dist/opl-packages/opl-release-promotion-receipt.json
          if-no-files-found: error
