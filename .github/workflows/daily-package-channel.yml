name: Daily OPL Package Channel

on:
  schedule:
    - cron: '23 18 * * *'
  workflow_dispatch:
    inputs:
      release_set_generation:
        description: Optional Release Set generation override. Empty uses current UTC YY.M.D.
        required: false
        type: string
      force_publish:
        description: Publish even when the package source fingerprint is unchanged
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  detect-package-channel-change:
    name: Detect package-channel source changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      publish_required: ${{ steps.decide.outputs.publish_required }}
      release_set_generation: ${{ steps.generation.outputs.release_set_generation }}
      changed_packages_json: ${{ steps.decide.outputs.changed_packages_json }}
    steps:
      - name: Checkout OPL
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Resolve Release Set generation
        id: generation
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.inputs.release_set_generation || '' }}"
          if [ -z "$base" ]; then
            base="$(date -u +'%y.%-m.%-d')"
          fi
          generation="${base#v}"
          if ! [[ "$generation" =~ ^[0-9]{2}\.[0-9]{1,2}\.[0-9]{1,2}(-r[1-9][0-9]*)?$ ]]; then
            echo "::error::Invalid daily Release Set generation: $generation"
            exit 1
          fi
          echo "release_set_generation=$generation" >> "$GITHUB_OUTPUT"
          echo "OPL_RELEASE_SET_GENERATION=$generation" >> "$GITHUB_ENV"
          echo "OPL_PACKAGES_OWNER=${{ github.repository_owner }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Fetch current latest-stable Release Set manifest
        id: current
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/opl-current-channel
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          if oras pull "ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-manifest:latest-stable" \
            --output dist/opl-current-channel; then
            current="$(find dist/opl-current-channel -name opl-channel-manifest.json -print -quit)"
            test -n "$current"
            if [ "$current" != "dist/opl-current-channel/opl-channel-manifest.json" ]; then
              cp "$current" dist/opl-current-channel/opl-channel-manifest.json
            fi
            echo "current_manifest=dist/opl-current-channel/opl-channel-manifest.json" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No latest-stable Release Set exists; bootstrapping all seven Packages to candidate."
            echo "current_manifest=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build candidate Package archives and Release Set manifest
        shell: bash
        env:
          OPL_PACKAGE_RELEASE_GATE: daily_package_channel_detection
        run: |
          set -euo pipefail
          args=(
            --release-set-generation "$OPL_RELEASE_SET_GENERATION"
            --owner "$OPL_PACKAGES_OWNER"
            --out-dir dist/opl-daily-packages
          )
          if [ -n "${{ steps.current.outputs.current_manifest }}" ]; then
            args+=(--previous-manifest "${{ steps.current.outputs.current_manifest }}")
          fi
          npm run packages:manifest -- "${args[@]}"

      - name: Compare package channel fingerprints
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          args=(
            --candidate-manifest dist/opl-daily-packages/opl-channel-manifest.json
            --release-set-generation "$OPL_RELEASE_SET_GENERATION"
            --summary-path dist/opl-daily-packages/daily-package-channel-summary.json
          )
          if [ -n "${{ steps.current.outputs.current_manifest }}" ]; then
            args+=(--current-manifest "${{ steps.current.outputs.current_manifest }}")
          fi
          npm run packages:daily-check -- "${args[@]}"
          publish_required="$(node -e "console.log(JSON.parse(require('fs').readFileSync('dist/opl-daily-packages/daily-package-channel-summary.json', 'utf8')).publish_required ? 'true' : 'false')")"
          if [ "${{ github.event.inputs.force_publish || 'false' }}" = true ]; then
            publish_required=true
          fi
          echo "publish_required=$publish_required" >> "$GITHUB_OUTPUT"
          changed_packages_json="$(node -e "console.log(JSON.stringify(JSON.parse(require('fs').readFileSync('dist/opl-daily-packages/daily-package-channel-summary.json', 'utf8')).changed_packages))")"
          echo "changed_packages_json=$changed_packages_json" >> "$GITHUB_OUTPUT"

      - name: Upload daily package-channel candidate evidence
        uses: actions/upload-artifact@v7
        with:
          name: opl-daily-package-channel-candidate-${{ steps.generation.outputs.release_set_generation }}
          path: dist/opl-daily-packages
          if-no-files-found: error

  publish-daily-package-channel:
    name: Publish changed daily package channel
    needs: detect-package-channel-change
    if: needs.detect-package-channel-change.outputs.publish_required == 'true'
    uses: ./.github/workflows/packages.yml
    with:
      release_set_generation: ${{ needs.detect-package-channel-change.outputs.release_set_generation }}
      release_gate: ${{ inputs.force_publish && 'daily_package_channel_forced' || 'daily_package_channel_changed' }}
      changed_packages_json: ${{ needs.detect-package-channel-change.outputs.changed_packages_json }}
      promotion_target: candidate
