name: Daily OPL Package Channel

on:
  schedule:
    - cron: '23 18 * * *'
  workflow_dispatch:
    inputs:
      release_set_generation:
        description: Optional Release Set generation override. Empty allocates the next UTC YY.M.D[-rN].
        required: false
        type: string
      force_publish:
        description: Publish even when the package source fingerprint is unchanged
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: opl-daily-package-channel-${{ github.repository_owner }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  detect-package-channel-change:
    name: Detect package-channel source changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      publish_required: ${{ steps.decide.outputs.publish_required }}
      release_set_generation: ${{ steps.generation.outputs.release_set_generation }}
      changed_packages_json: ${{ steps.decide.outputs.changed_packages_json }}
      owner_cohort_artifact_name: ${{ steps.generation.outputs.owner_cohort_artifact_name }}
      app_version: ${{ steps.app.outputs.app_version }}
      frozen_base_release_set_generation: ${{ steps.current.outputs.frozen_base_release_set_generation }}
      frozen_base_release_set_digest: ${{ steps.current.outputs.frozen_base_release_set_digest }}
    steps:
      - name: Checkout OPL
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup ORAS
        uses: oras-project/setup-oras@v1

      - name: Resolve Release Set generation
        id: generation
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          requested="${{ github.event.inputs.release_set_generation || '' }}"
          if [ -n "$requested" ]; then
            generation="${requested#v}"
          else
            base="$(date -u +'%y.%-m.%-d')"
            tags_file="$RUNNER_TEMP/opl-release-set-tags.txt"
            echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
            oras repo tags "ghcr.io/${{ github.repository_owner }}/one-person-lab-manifest" > "$tags_file"
            generation="$(node scripts/release-set-generation.mjs --base "$base" --existing-tags-file "$tags_file")"
          fi
          if ! [[ "$generation" =~ ^[0-9]{2}\.[0-9]{1,2}\.[0-9]{1,2}(-r[1-9][0-9]*)?$ ]]; then
            echo "::error::Invalid daily Release Set generation: $generation"
            exit 1
          fi
          echo "release_set_generation=$generation" >> "$GITHUB_OUTPUT"
          echo "owner_cohort_artifact_name=opl-daily-package-channel-candidate-$generation" >> "$GITHUB_OUTPUT"
          echo "OPL_RELEASE_SET_GENERATION=$generation" >> "$GITHUB_ENV"
          echo "OPL_PACKAGES_OWNER=${{ github.repository_owner }}" >> "$GITHUB_ENV"

      - name: Fetch current latest-stable Release Set manifest
        id: current
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/opl-current-channel
          echo "${{ github.token }}" | oras login ghcr.io -u "${{ github.actor }}" --password-stdin
          carrier="ghcr.io/${OPL_PACKAGES_OWNER}/one-person-lab-manifest"
          descriptor="$RUNNER_TEMP/opl-latest-stable-descriptor.json"
          descriptor_error="$RUNNER_TEMP/opl-latest-stable-descriptor.error"
          if ! oras manifest fetch --descriptor "${carrier}:latest-stable" \
            > "$descriptor" 2> "$descriptor_error"; then
            tags="$RUNNER_TEMP/opl-release-set-tags-at-freeze.txt"
            if ! oras repo tags "$carrier" > "$tags"; then
              echo "::error::Unable to verify whether latest-stable exists; bootstrap is forbidden on an availability error."
              exit 1
            fi
            if grep -Fxq latest-stable "$tags"; then
              echo "::error::latest-stable exists but its exact digest could not be resolved."
              exit 1
            fi
            echo "::notice::No latest-stable Release Set exists; bootstrapping all seven Packages to candidate."
            {
              echo "current_manifest="
              echo "frozen_base_release_set_generation=none"
              echo "frozen_base_release_set_digest=none"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi
          frozen_digest="$(jq -er '.digest | select(test("^sha256:[0-9a-f]{64}$"))' "$descriptor")"
          oras pull "${carrier}@${frozen_digest}" --output dist/opl-current-channel
          mapfile -t release_manifests < <(find dist/opl-current-channel -type f -name opl-release-manifest.json -print)
          mapfile -t channel_manifests < <(find dist/opl-current-channel -type f -name opl-channel-manifest.json -print)
          [ "${#release_manifests[@]}" -eq 1 ] && [ "${#channel_manifests[@]}" -eq 1 ] || {
            echo "::error::Frozen latest-stable carrier must contain exactly one release manifest and one channel manifest."
            exit 1
          }
          release_manifest="${release_manifests[0]}"
          current="${channel_manifests[0]}"
          frozen_generation="$(jq -er '.release_set.generation | select(test("^[0-9]{2}\\.[0-9]{1,2}\\.[0-9]{1,2}(-r[1-9][0-9]*)?$"))' "$release_manifest")"
          jq -e \
            --arg generation "$frozen_generation" \
            '.release_set.surface_kind == "opl_release_set.v2"
              and .release_set.bom_status == "complete"
              and .release_set_generation == $generation
              and .release_set.generation == $generation' \
            "$release_manifest" >/dev/null
          jq -e --arg generation "$frozen_generation" \
            '.release_set_generation == $generation' "$current" >/dev/null
          if [ "$current" != "dist/opl-current-channel/opl-channel-manifest.json" ]; then
            cp "$current" dist/opl-current-channel/opl-channel-manifest.json
          fi
          {
            echo "current_manifest=dist/opl-current-channel/opl-channel-manifest.json"
            echo "frozen_base_release_set_generation=$frozen_generation"
            echo "frozen_base_release_set_digest=$frozen_digest"
          } >> "$GITHUB_OUTPUT"

      - name: Build candidate Package archives and Release Set manifest
        id: app
        shell: bash
        env:
          OPL_PACKAGE_RELEASE_GATE: daily_package_channel_detection
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          app_version=""
          if [ -n "${{ steps.current.outputs.current_manifest }}" ] \
            && [ "$(jq -r '.release_set.surface_kind // empty' '${{ steps.current.outputs.current_manifest }}')" = opl_release_set.v2 ]; then
            app_version="$(jq -r '.release_set.components.app.version' '${{ steps.current.outputs.current_manifest }}')"
          fi
          if [ -z "$app_version" ]; then
            # Bootstrap performs its one App authority read inside this admission job.
            app_version="$(gh release list --repo gaofeng21cn/one-person-lab-app --limit 50 \
              --json tagName,isDraft,isPrerelease,publishedAt \
              --jq '[.[] | select(.isDraft == false and .isPrerelease == false and .publishedAt != null)][0].tagName' | sed 's/^v//')"
          fi
          [[ "$app_version" =~ ^[0-9]{2}\.[0-9]{1,2}\.[0-9]{1,2}$ ]]
          gh release view "v$app_version" --repo gaofeng21cn/one-person-lab-app \
            --json tagName,isDraft,isPrerelease,publishedAt,targetCommitish,assets,url \
            > "$RUNNER_TEMP/opl-app-release.json"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          owner_manifest=""
          mkdir -p "$RUNNER_TEMP/opl-app-owner-component"
          if gh release download "v$app_version" --repo gaofeng21cn/one-person-lab-app \
            --pattern opl-app-component-manifest.json --dir "$RUNNER_TEMP/opl-app-owner-component"; then
            owner_manifest="$RUNNER_TEMP/opl-app-owner-component/opl-app-component-manifest.json"
          else
            echo "::notice::Historical App release has no owner component manifest; using exact public tag readback."
          fi
          app_commit=""
          if [ -n "$owner_manifest" ]; then
            app_commit="$(jq -r .source_commit "$owner_manifest")"
          fi
          if [ -z "$app_commit" ]; then
            app_commit="$(gh api "repos/gaofeng21cn/one-person-lab-app/commits/v$app_version" --jq .sha)"
          fi
          [[ "$app_commit" =~ ^[0-9a-f]{40}$ ]]
          component_args=(
            --release-json "$RUNNER_TEMP/opl-app-release.json" \
            --source-commit "$app_commit" \
            --output "$RUNNER_TEMP/opl-app-component-manifest.json"
          )
          [ -z "$owner_manifest" ] || component_args+=(--owner-manifest "$owner_manifest")
          node scripts/resolve-opl-app-component.mjs "${component_args[@]}"
          args=(
            --release-set-generation "$OPL_RELEASE_SET_GENERATION"
            --owner "$OPL_PACKAGES_OWNER"
            --out-dir dist/opl-daily-packages
            --owner-cohort-mode framework-projection
            --app-component-manifest "$RUNNER_TEMP/opl-app-component-manifest.json"
          )
          if [ -n "${{ steps.current.outputs.current_manifest }}" ]; then
            args+=(--previous-manifest "${{ steps.current.outputs.current_manifest }}")
          fi
          build_log="$RUNNER_TEMP/opl-daily-candidate-build.log"
          set +e
          npm run packages:manifest -- "${args[@]}" 2>&1 | tee "$build_log"
          build_status="${PIPESTATUS[0]}"
          set -e
          if [ "$build_status" -ne 0 ]; then
            current_manifest="${{ steps.current.outputs.current_manifest }}"
            if [ -z "$current_manifest" ]; then
              echo "::error::Candidate build failed and no latest-stable Release Set exists for fallback."
              exit "$build_status"
            fi
            mkdir -p dist/opl-daily-packages
            cp "$build_log" dist/opl-daily-packages/candidate-build.log
            npm run packages:daily-check -- \
              --current-manifest "$current_manifest" \
              --release-set-generation "$OPL_RELEASE_SET_GENERATION" \
              --fallback-stage candidate_manifest_build \
              --fallback-exit-code "$build_status" \
              --fallback-log dist/opl-daily-packages/candidate-build.log \
              --summary-path dist/opl-daily-packages/daily-package-channel-summary.json
            echo "candidate_built=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Candidate build failed; retaining the previous latest-stable Release Set."
            exit 0
          fi
          echo "candidate_built=true" >> "$GITHUB_OUTPUT"

      - name: Compare package channel fingerprints
        id: decide
        shell: bash
        run: |
          set -euo pipefail
          summary=dist/opl-daily-packages/daily-package-channel-summary.json
          if [ "${{ steps.app.outputs.candidate_built }}" = true ]; then
            args=(
              --candidate-manifest dist/opl-daily-packages/opl-channel-manifest.json
              --release-set-generation "$OPL_RELEASE_SET_GENERATION"
              --summary-path "$summary"
            )
            if [ -n "${{ steps.current.outputs.current_manifest }}" ]; then
              args+=(--current-manifest "${{ steps.current.outputs.current_manifest }}")
            fi
            npm run packages:daily-check -- "${args[@]}"
          else
            test -f "$summary"
          fi
          summary_status="$(jq -r .status "$summary")"
          publish_required="$(jq -r .publish_required "$summary")"
          if [ "${{ github.event.inputs.force_publish || 'false' }}" = true ] \
            && [ "$summary_status" != retained_previous_stable ]; then
            publish_required=true
          elif [ "${{ github.event.inputs.force_publish || 'false' }}" = true ]; then
            echo "::warning::force_publish cannot bypass latest-stable fallback."
          fi
          echo "publish_required=$publish_required" >> "$GITHUB_OUTPUT"
          changed_packages_json="$(jq -c .changed_packages "$summary")"
          echo "changed_packages_json=$changed_packages_json" >> "$GITHUB_OUTPUT"
          {
            echo "### Daily package channel"
            echo "- Status: \`$summary_status\`"
            echo "- Publish required: \`$publish_required\`"
            echo "- Retained components: \`$(jq -c .retained_components "$summary")\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload daily package-channel candidate evidence
        uses: actions/upload-artifact@v7
        with:
          name: opl-daily-package-channel-candidate-${{ steps.generation.outputs.release_set_generation }}
          path: dist/opl-daily-packages
          if-no-files-found: error

  publish-daily-package-channel:
    name: Publish changed daily package channel
    needs: detect-package-channel-change
    if: needs.detect-package-channel-change.outputs.publish_required == 'true'
    uses: ./.github/workflows/packages.yml
    with:
      release_set_generation: ${{ needs.detect-package-channel-change.outputs.release_set_generation }}
      expected_framework_source_commit: ${{ github.sha }}
      frozen_base_release_set_generation: ${{ needs.detect-package-channel-change.outputs.frozen_base_release_set_generation }}
      frozen_base_release_set_digest: ${{ needs.detect-package-channel-change.outputs.frozen_base_release_set_digest }}
      app_version: ${{ needs.detect-package-channel-change.outputs.app_version }}
      release_gate: ${{ inputs.force_publish && 'daily_package_channel_forced' || 'daily_package_channel_changed' }}
      changed_packages_json: ${{ needs.detect-package-channel-change.outputs.changed_packages_json }}
      promotion_target: candidate
      promotion_request_id: daily-${{ needs.detect-package-channel-change.outputs.release_set_generation }}
      owner_cohort_artifact_name: ${{ needs.detect-package-channel-change.outputs.owner_cohort_artifact_name }}
