name: Verify

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  javascript:
    name: ${{ matrix.name }}
    runs-on: macos-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Build and typecheck
            timeout_minutes: 15
            command: npm run build && npm run typecheck
          - name: Fast lane
            timeout_minutes: 25
            command: npm run test:fast
          - name: Read-model gates
            timeout_minutes: 30
            command: npm run test:read-model-gates
          - name: Regression lane
            timeout_minutes: 20
            command: npm run test:regression
          - name: Integration lane
            timeout_minutes: 25
            command: npm run test:integration
          - name: Fresh-install lane
            timeout_minutes: 15
            command: npm run test:fresh-install

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run JavaScript gate
        run: ${{ matrix.command }}

  native:
    name: Native helper lane
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install dependencies
        run: npm ci

      - name: Verify native helper lifecycle and fixture family smoke
        run: ./scripts/verify.sh native

  lint-and-structure:
    name: Lint and local structure gate
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure origin/main compare ref
        shell: bash
        run: git fetch --no-tags origin +main:refs/remotes/origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install Sentrux
        run: ./scripts/install-sentrux-ci.sh

      - name: Install dependencies
        run: npm ci

      - name: Lint and line budget
        run: ./scripts/verify.sh lint

      - name: Verify reuse-first diff gate
        run: ./scripts/verify.sh reuse-first

      - name: Verify local structural quality gate
        env:
          OPL_QUALITY_DETAILS_TIMEOUT_SECONDS: '240'
        run: ./scripts/verify.sh structure
