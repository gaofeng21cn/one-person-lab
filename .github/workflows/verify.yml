name: Verify

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-and-typecheck:
    name: Build and typecheck
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

  fast:
    name: Fast lane
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify fast lane
        run: npm run test:fast

  read-model-gates:
    name: Read-model gates
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify read-model gates
        run: npm run test:read-model-gates

  regression:
    name: Regression lane
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify regression lane
        run: npm run test:regression

  integration:
    name: Integration lane
    runs-on: macos-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify integration lane
        run: npm run test:integration

  fresh-install:
    name: Fresh-install lane
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify fresh-install clean-room matrix
        run: npm run test:fresh-install

  native:
    name: Native helper lane
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install dependencies
        run: npm ci

      - name: Verify native helper lifecycle and fixture family smoke
        run: ./scripts/verify.sh native

  lint-and-structure:
    name: Lint and local structure gate
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Ensure origin/main compare ref
        shell: bash
        run: git fetch --no-tags origin +main:refs/remotes/origin/main

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Install Sentrux
        run: ./scripts/install-sentrux-ci.sh

      - name: Install dependencies
        run: npm ci

      - name: Lint and line budget
        run: ./scripts/verify.sh lint

      - name: Verify reuse-first diff gate
        run: ./scripts/verify.sh reuse-first

      - name: Verify local structural quality gate
        env:
          OPL_QUALITY_DETAILS_TIMEOUT_SECONDS: '240'
        run: ./scripts/verify.sh structure
