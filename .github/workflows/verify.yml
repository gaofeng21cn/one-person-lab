name: Verify

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  opl-native-and-contracts:
    name: OPL native helper and contract gates
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Verify metadata and contracts
        run: npm run test:meta

      - name: Verify native helper lifecycle
        run: ./scripts/verify.sh native

      - name: Verify native helper fixture family smoke
        run: npm run native:family-smoke -- --fixture --require-real-workspaces

      - name: Lint and line budget
        run: ./scripts/verify.sh lint
