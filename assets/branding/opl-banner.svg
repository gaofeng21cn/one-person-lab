<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="One Person Lab banner">
  <title>One Person Lab banner</title>
  <defs>
    <linearGradient id="banner-bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FBFF"/>
      <stop offset="0.58" stop-color="#EEF6FF"/>
      <stop offset="1" stop-color="#EAF8F7"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="96" y1="82" x2="414" y2="338" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08233D"/>
      <stop offset="0.62" stop-color="#0F4D7D"/>
      <stop offset="1" stop-color="#2BB8B0"/>
    </linearGradient>
    <filter id="soft-shadow" x="-40" y="-40" width="1680" height="500" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#173A5D" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1600" height="420" fill="url(#banner-bg)"/>
  <rect x="40" y="38" width="1520" height="344" rx="34" fill="#FFFFFF" fill-opacity="0.78" stroke="#D5E3F2" stroke-width="2"/>
  <g filter="url(#soft-shadow)">
    <rect x="104" y="84" width="292" height="252" rx="62" fill="url(#icon-bg)"/>
    <rect x="158" y="126" width="184" height="190" rx="42" fill="#F8FCFF" fill-opacity="0.96"/>
    <path d="M250 158C188.144 158 138 208.144 138 270C138 331.856 188.144 382 250 382" transform="translate(0 -48)" stroke="#0E385D" stroke-width="16" stroke-linecap="round"/>
    <path d="M250 190C205.817 190 170 225.817 170 270C170 314.183 205.817 350 250 350" transform="translate(0 -48)" stroke="#2BB8B0" stroke-width="14" stroke-linecap="round"/>
    <circle cx="250" cy="222" r="34" fill="#0E385D"/>
    <circle cx="250" cy="222" r="15" fill="#7CE8E0"/>
    <circle cx="174" cy="172" r="12" fill="#2BB8B0"/>
    <circle cx="326" cy="172" r="12" fill="#F3B44B"/>
    <circle cx="326" cy="274" r="12" fill="#7CA7FF"/>
  </g>
  <text x="472" y="126" fill="#0D2A45" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="3.2">ONE PERSON LAB</text>
  <text x="472" y="188" fill="#0D2A45" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="54" font-weight="800">One workbench for serious expert work</text>
  <text x="474" y="238" fill="#49677F" font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="25">Plan long-running research, grants, and presentations with expert agents, trusted progress, and organized deliverables.</text>
  <g font-family="Inter, Avenir Next, Helvetica, Arial, sans-serif" font-size="18" font-weight="700">
    <rect x="474" y="286" width="188" height="48" rx="24" fill="#EAF3FF" stroke="#BBD2EC"/>
    <text x="568" y="316" text-anchor="middle" fill="#174A73">Research</text>
    <rect x="682" y="286" width="154" height="48" rx="24" fill="#FFF4DD" stroke="#E3C27B"/>
    <text x="759" y="316" text-anchor="middle" fill="#8A6415">Grants</text>
    <rect x="856" y="286" width="202" height="48" rx="24" fill="#E8FAF8" stroke="#AADAD6"/>
    <text x="957" y="316" text-anchor="middle" fill="#247A75">Presentations</text>
    <rect x="1078" y="286" width="190" height="48" rx="24" fill="#F1F5FA" stroke="#CAD6E4"/>
    <text x="1173" y="316" text-anchor="middle" fill="#3E5D78">Progress</text>
    <rect x="1288" y="286" width="154" height="48" rx="24" fill="#F1F5FA" stroke="#CAD6E4"/>
    <text x="1365" y="316" text-anchor="middle" fill="#3E5D78">Files</text>
