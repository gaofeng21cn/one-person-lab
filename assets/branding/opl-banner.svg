<svg width="1600" height="420" viewBox="0 0 1600 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="One Person Lab banner">
  <title>One Person Lab banner</title>
  <defs>
    <linearGradient id="banner-bg" x1="0" y1="0" x2="1600" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FBFF"/>
      <stop offset="0.62" stop-color="#EEF6FF"/>
      <stop offset="1" stop-color="#EAF8F7"/>
    </linearGradient>
    <linearGradient id="icon-bg" x1="92" y1="86" x2="372" y2="334" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#08233D"/>
      <stop offset="0.56" stop-color="#0F4D7D"/>
